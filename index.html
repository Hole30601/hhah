<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý UDID - Firebase Auth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        /* Màn hình đăng nhập */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .auth-container {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .auth-logo .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .auth-logo h2 {
            font-size: 24px;
            background: linear-gradient(90deg, #ff6b6b, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-logo p {
            color: #aaa;
            font-size: 13px;
            margin-top: 5px;
        }

        .auth-input-group {
            margin-bottom: 18px;
        }

        .auth-input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #ccc;
            font-weight: 600;
        }

        .auth-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .auth-input:focus {
            border-color: #ffa500;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.15);
        }

        .auth-input::placeholder {
            color: #666;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .auth-btn-login {
            background: linear-gradient(135deg, #ffa500, #ff6b6b);
            color: white;
        }

        .auth-btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .auth-btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-error {
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: #ff4757;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }

        .auth-divider {
            text-align: center;
            color: #666;
            margin: 20px 0;
            position: relative;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .auth-divider::before {
            left: 0;
        }

        .auth-divider::after {
            right: 0;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 15px;
            color: #aaa;
            font-size: 13px;
        }

        .auth-toggle a {
            color: #ffa500;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        /* Container chính */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 13px;
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffa500, #ff6b6b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-logout {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 71, 87, 0.4);
            background: rgba(255, 71, 87, 0.1);
            color: #ff4757;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(255, 71, 87, 0.2);
        }

        h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #ff6b6b, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-connected {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .status-disconnected {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .dot-connected {
            background: #2ed573;
            box-shadow: 0 0 10px #2ed573;
        }

        .dot-disconnected {
            background: #ff4757;
            box-shadow: 0 0 10px #ff4757;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            flex: 1;
            min-width: 120px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        .stat-blocked .stat-number { color: #ff4757; }
        .stat-active .stat-number { color: #2ed573; }
        .stat-total .stat-number { color: #ffa500; }

        .search-container {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #ffa500;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.2);
        }

        .search-input::placeholder {
            color: #888;
        }

        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            pointer-events: none;
        }

        .btn-container {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-block-all {
            background: linear-gradient(135deg, #ff4757, #ff3838);
            color: white;
            flex: 1;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        .btn-block-all:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 71, 87, 0.5);
        }

        .btn-unblock-all {
            background: linear-gradient(135deg, #2ed573, #1abc9c);
            color: white;
            flex: 1;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.3);
        }

        .btn-unblock-all:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(46, 213, 115, 0.5);
        }

        .btn-refresh {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-refresh:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .loading-container {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ffa500;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .udid-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .udid-list::-webkit-scrollbar {
            width: 6px;
        }

        .udid-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .udid-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .udid-item {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
            flex-wrap: wrap;
            gap: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .udid-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .udid-item.blocked {
            border-left: 4px solid #ff4757;
            background: rgba(255, 71, 87, 0.1);
        }

        .udid-item.active {
            border-left: 4px solid #2ed573;
        }

        .udid-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 200px;
        }

        .udid-text {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #ddd;
            word-break: break-all;
            font-weight: 600;
        }

        .udid-details {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 11px;
            color: #aaa;
        }

        .udid-detail-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .udid-status {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 10px;
            border-radius: 10px;
        }

        .status-blocked {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }

        .status-active {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
        }

        .udid-actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-action:active {
            transform: scale(0.9);
        }

        .btn-block {
            background: #ff4757;
            color: white;
        }

        .btn-block:hover {
            background: #ff3838;
            box-shadow: 0 2px 10px rgba(255, 71, 87, 0.4);
        }

        .btn-unblock {
            background: #2ed573;
            color: white;
        }

        .btn-unblock:hover {
            background: #1abc9c;
            box-shadow: 0 2px 10px rgba(46, 213, 115, 0.4);
        }

        .btn-delete {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
        }

        .btn-delete:hover {
            background: rgba(255, 71, 87, 0.3);
            color: #ff4757;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .empty-state .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            max-width: 400px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success { background: #2ed573; }
        .notification.error { background: #ff4757; }
        .notification.info { background: #3498db; }

        .confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1500;
            animation: fadeIn 0.2s ease;
        }

        .confirm-modal {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .confirm-modal h3 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .confirm-modal p {
            margin-bottom: 20px;
            color: #ccc;
            line-height: 1.5;
        }

        .confirm-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .confirm-btn-yes {
            padding: 10px 24px;
            border-radius: 25px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            background: #ff4757;
            color: white;
            font-size: 14px;
        }

        .confirm-btn-no {
            padding: 10px 24px;
            border-radius: 25px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }

        .error-container {
            text-align: center;
            padding: 40px;
            color: #ff4757;
        }

        .error-container .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .last-update {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 15px;
            }
            
            .udid-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .udid-actions {
                width: 100%;
                justify-content: flex-end;
            }
            
            .btn {
                padding: 10px 16px;
                font-size: 13px;
            }
            
            .stats {
                flex-direction: column;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .auth-container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <!-- Màn hình đăng nhập -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-container" id="authContainer">
            <!-- Form đăng nhập -->
            <div id="loginForm">
                <div class="auth-logo">
                    <div class="icon">🔒</div>
                    <h2>Đăng Nhập</h2>
                    <p>Quản lý UDID Devices</p>
                </div>
                <div class="auth-error" id="loginError"></div>
                <div class="auth-input-group">
                    <label>📧 Email</label>
                    <input type="email" class="auth-input" id="loginEmail" placeholder="Nhập email của bạn">
                </div>
                <div class="auth-input-group">
                    <label>🔑 Mật khẩu</label>
                    <input type="password" class="auth-input" id="loginPassword" placeholder="Nhập mật khẩu">
                </div>
                <button class="auth-btn auth-btn-login" id="loginBtn" onclick="handleLogin()">
                    Đăng Nhập
                </button>
                <div class="auth-toggle">
                    Chưa có tài khoản? <a onclick="showRegisterForm()">Đăng ký</a>
                </div>
            </div>

            <!-- Form đăng ký -->
            <div id="registerForm" style="display: none;">
                <div class="auth-logo">
                    <div class="icon">📝</div>
                    <h2>Đăng Ký</h2>
                    <p>Tạo tài khoản quản lý mới</p>
                </div>
                <div class="auth-error" id="registerError"></div>
                <div class="auth-input-group">
                    <label>📧 Email</label>
                    <input type="email" class="auth-input" id="registerEmail" placeholder="Nhập email của bạn">
                </div>
                <div class="auth-input-group">
                    <label>🔑 Mật khẩu</label>
                    <input type="password" class="auth-input" id="registerPassword" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)">
                </div>
                <div class="auth-input-group">
                    <label>🔑 Xác nhận mật khẩu</label>
                    <input type="password" class="auth-input" id="registerConfirmPassword" placeholder="Nhập lại mật khẩu">
                </div>
                <button class="auth-btn auth-btn-login" id="registerBtn" onclick="handleRegister()">
                    Đăng Ký
                </button>
                <div class="auth-toggle">
                    Đã có tài khoản? <a onclick="showLoginForm()">Đăng nhập</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Giao diện chính (ẩn khi chưa đăng nhập) -->
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>🔒 Quản Lý UDID</h1>
            <div class="header-right">
                <div class="user-info" id="userInfo">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span id="userEmail">user@email.com</span>
                </div>
                <button class="btn-logout" onclick="handleLogout()">🚪 Đăng xuất</button>
                <div class="connection-status status-disconnected" id="connectionStatus">
                    <span class="status-dot dot-disconnected" id="statusDot"></span>
                    <span id="statusText">Đang kết nối...</span>
                </div>
            </div>
        </div>
        
        <p style="color: #aaa; margin-bottom: 20px; font-size: 14px; text-align: center;">
            Kết nối tới Firebase Realtime Database
        </p>

        <div class="stats">
            <div class="stat-card stat-total">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">📱 Tổng số</div>
            </div>
            <div class="stat-card stat-blocked">
                <div class="stat-number" id="blockedCount">0</div>
                <div class="stat-label">🚫 Đã chặn</div>
            </div>
            <div class="stat-card stat-active">
                <div class="stat-number" id="activeCount">0</div>
                <div class="stat-label">✅ Hoạt động</div>
            </div>
        </div>

        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Tìm kiếm UDID...">
            <span class="search-icon">🔍</span>
        </div>

        <div class="btn-container">
            <button class="btn btn-block-all" onclick="confirmBlockAll()">
                🚫 Chặn tất cả
            </button>
            <button class="btn btn-unblock-all" onclick="confirmUnblockAll()">
                ✅ Mở khóa tất cả
            </button>
            <button class="btn btn-refresh" onclick="loadDevices()">
                🔄 Làm mới
            </button>
        </div>

        <div id="udidList">
            <div class="loading-container">
                <div class="spinner"></div>
                <p>Đang tải dữ liệu từ Firebase...</p>
            </div>
        </div>

        <div class="last-update" id="lastUpdate"></div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAv2nCutccY9w989YWnxGF0oIdnOiOu2gY",
            authDomain: "dbanand-73d4b.firebaseapp.com",
            databaseURL: "https://dbanand-73d4b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dbanand-73d4b",
            storageBucket: "dbanand-73d4b.firebasestorage.app",
            messagingSenderId: "134109863841",
            appId: "1:134109863841:web:e85af018975585250ab5e0",
            measurementId: "G-87M88GHTKY"
        };

        // Biến toàn cục
        let firebaseApp;
        let auth;
        let database;
        let devicesRef;
        let allDevices = {};
        let isConnected = false;
        let currentUser = null;
        let authListenersSetup = false;

        // ============================================================
        // KHỞI TẠO FIREBASE
        // ============================================================
        function initializeFirebase() {
            try {
                firebaseApp = firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                database = firebase.database();
                devicesRef = database.ref('devices');
                
                console.log('✅ Firebase đã được khởi tạo');
                
                // Lắng nghe trạng thái xác thực
                setupAuthListener();
                
            } catch (error) {
                console.error('❌ Lỗi khởi tạo Firebase:', error);
                showNotification('❌ Lỗi khởi tạo: ' + error.message, 'error');
            }
        }

        // ============================================================
        // XÁC THỰC NGƯỜI DÙNG
        // ============================================================
        function setupAuthListener() {
            auth.onAuthStateChanged((user) => {
                currentUser = user;
                
                if (user) {
                    // Người dùng đã đăng nhập
                    console.log('👤 Đã đăng nhập:', user.email);
                    document.getElementById('authOverlay').style.display = 'none';
                    document.getElementById('mainContainer').style.display = 'block';
                    
                    // Cập nhật thông tin người dùng
                    document.getElementById('userEmail').textContent = user.email;
                    const avatar = document.getElementById('userAvatar');
                    avatar.textContent = user.email.charAt(0).toUpperCase();
                    
                    // Thiết lập listener cho database
                    setupDatabaseListeners();
                    
                    showNotification('✅ Đăng nhập thành công!', 'success');
                } else {
                    // Người dùng chưa đăng nhập
                    console.log('👤 Chưa đăng nhập');
                    document.getElementById('authOverlay').style.display = 'flex';
                    document.getElementById('mainContainer').style.display = 'none';
                    
                    // Xóa listener database nếu có
                    if (devicesRef) {
                        devicesRef.off();
                    }
                    allDevices = {};
                }
            });
        }

        function setupDatabaseListeners() {
            if (!currentUser) return;
            
            // Lắng nghe trạng thái kết nối
            const connectedRef = database.ref('.info/connected');
            connectedRef.on('value', (snap) => {
                isConnected = snap.val() === true;
                updateConnectionStatus();
            });

            // Lắng nghe thay đổi realtime từ Firebase
            devicesRef.on('value', (snapshot) => {
                const data = snapshot.val();
                allDevices = data || {};
                renderUDIDList();
                updateConnectionStatus();
            }, (error) => {
                console.error('Lỗi Firebase:', error);
                if (error.code === 'PERMISSION_DENIED') {
                    showNotification('❌ Bạn không có quyền truy cập dữ liệu này', 'error');
                } else {
                    showNotification('❌ Lỗi kết nối Firebase: ' + error.message, 'error');
                }
                document.getElementById('udidList').innerHTML = `
                    <div class="error-container">
                        <div class="icon">⚠️</div>
                        <h3>Không thể kết nối Firebase</h3>
                        <p style="color: #aaa;">${error.message}</p>
                        <button class="btn btn-refresh" onclick="setupDatabaseListeners()" style="margin-top: 15px;">
                            🔄 Thử lại
                        </button>
                    </div>
                `;
            });
        }

        // ============================================================
        // ĐĂNG NHẬP / ĐĂNG KÝ / ĐĂNG XUẤT
        // ============================================================
        function showLoginForm() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
            clearAuthInputs();
        }

        function showRegisterForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
            clearAuthInputs();
        }

        function clearAuthInputs() {
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('registerEmail').value = '';
            document.getElementById('registerPassword').value = '';
            document.getElementById('registerConfirmPassword').value = '';
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            // Validate
            if (!email || !password) {
                showAuthError(errorEl, 'Vui lòng nhập đầy đủ email và mật khẩu');
                return;
            }

            // Disable button
            btn.disabled = true;
            btn.textContent = 'Đang đăng nhập...';
            errorEl.style.display = 'none';

            try {
                await auth.signInWithEmailAndPassword(email, password);
                console.log('✅ Đăng nhập thành công');
            } catch (error) {
                console.error('❌ Lỗi đăng nhập:', error);
                let message = 'Đăng nhập thất bại';
                
                switch (error.code) {
                    case 'auth/invalid-email':
                        message = 'Email không hợp lệ';
                        break;
                    case 'auth/user-disabled':
                        message = 'Tài khoản đã bị vô hiệu hóa';
                        break;
                    case 'auth/user-not-found':
                        message = 'Không tìm thấy tài khoản với email này';
                        break;
                    case 'auth/wrong-password':
                        message = 'Mật khẩu không chính xác';
                        break;

                        message = 'Email hoặc mật khẩu không ch
