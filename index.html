<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý UDID - Firebase Auth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        /* Màn hình đăng nhập */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .auth-container {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .auth-logo .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .auth-logo h2 {
            font-size: 24px;
            background: linear-gradient(90deg, #ff6b6b, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-logo p {
            color: #aaa;
            font-size: 13px;
            margin-top: 5px;
        }

        .auth-input-group {
            margin-bottom: 18px;
        }

        .auth-input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #ccc;
            font-weight: 600;
        }

        .auth-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .auth-input:focus {
            border-color: #ffa500;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.15);
        }

        .auth-input::placeholder { color: #666; }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .auth-btn-login {
            background: linear-gradient(135deg, #ffa500, #ff6b6b);
            color: white;
        }

        .auth-btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .auth-btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-error {
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: #ff4757;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 15px;
            color: #aaa;
            font-size: 13px;
        }

        .auth-toggle a {
            color: #ffa500;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-toggle a:hover { text-decoration: underline; }

        /* Container chính */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 13px;
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffa500, #ff6b6b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-logout {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 71, 87, 0.4);
            background: rgba(255, 71, 87, 0.1);
            color: #ff4757;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-logout:hover { background: rgba(255, 71, 87, 0.2); }

        h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #ff6b6b, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-connected {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .status-disconnected {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .dot-connected {
            background: #2ed573;
            box-shadow: 0 0 10px #2ed573;
        }

        .dot-disconnected {
            background: #ff4757;
            box-shadow: 0 0 10px #ff4757;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            flex: 1;
            min-width: 120px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.3s ease;
        }

        .stat-card:hover { transform: translateY(-2px); }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        .stat-blocked .stat-number { color: #ff4757; }
        .stat-active .stat-number { color: #2ed573; }
        .stat-total .stat-number { color: #ffa500; }

        .search-container {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #ffa500;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.2);
        }

        .search-input::placeholder { color: #888; }

        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            pointer-events: none;
        }

        .btn-container {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn:active { transform: scale(0.95); }

        .btn-block-all {
            background: linear-gradient(135deg, #ff4757, #ff3838);
            color: white;
            flex: 1;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        .btn-block-all:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 71, 87, 0.5);
        }

        .btn-unblock-all {
            background: linear-gradient(135deg, #2ed573, #1abc9c);
            color: white;
            flex: 1;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.3);
        }

        .btn-unblock-all:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(46, 213, 115, 0.5);
        }

        .btn-refresh {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-refresh:hover { background: rgba(255, 255, 255, 0.2); }

        .loading-container {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ffa500;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .udid-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .udid-list::-webkit-scrollbar { width: 6px; }
        .udid-list::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        .udid-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        .udid-item {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
            flex-wrap: wrap;
            gap: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .udid-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .udid-item.blocked {
            border-left: 4px solid #ff4757;
            background: rgba(255, 71, 87, 0.1);
        }

        .udid-item.active {
            border-left: 4px solid #2ed573;
        }

        .udid-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 200px;
        }

        .udid-text {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #ddd;
            word-break: break-all;
            font-weight: 600;
        }

        .udid-details {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 11px;
            color: #aaa;
        }

        .udid-detail-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .udid-status {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 10px;
            border-radius: 10px;
        }

        .status-blocked {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }

        .status-active {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
        }

        .udid-actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-action:active { transform: scale(0.9); }

        .btn-block {
            background: #ff4757;
            color: white;
        }

        .btn-block:hover {
            background: #ff3838;
            box-shadow: 0 2px 10px rgba(255, 71, 87, 0.4);
        }

        .btn-unblock {
            background: #2ed573;
            color: white;
        }

        .btn-unblock:hover {
            background: #1abc9c;
            box-shadow: 0 2px 10px rgba(46, 213, 115, 0.4);
        }

        .btn-delete {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
        }

        .btn-delete:hover {
            background: rgba(255, 71, 87, 0.3);
            color: #ff4757;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .empty-state .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            max-width: 400px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .notification.success { background: #2ed573; }
        .notification.error { background: #ff4757; }
        .notification.info { background: #3498db; }
        .notification.warning { background: #ffa500; }

        .confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1500;
            animation: fadeIn 0.2s ease;
        }

        .confirm-modal {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .confirm-modal h3 { margin-bottom: 15px; font-size: 20px; }
        .confirm-modal p { margin-bottom: 20px; color: #ccc; line-height: 1.5; }

        .confirm-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .confirm-btn-yes {
            padding: 10px 24px;
            border-radius: 25px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            background: #ff4757;
            color: white;
            font-size: 14px;
        }

        .confirm-btn-no {
            padding: 10px 24px;
            border-radius: 25px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }

        .error-container {
            text-align: center;
            padding: 40px;
            color: #ff4757;
        }

        .error-container .icon { font-size: 60px; margin-bottom: 15px; }

        .last-update {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 20px;
        }

        .blocked-badge {
            display: inline-block;
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
            margin-left: 5px;
        }

        @media (max-width: 600px) {
            .container { padding: 20px 15px; }
            .udid-item { flex-direction: column; align-items: flex-start; }
            .udid-actions { width: 100%; justify-content: flex-end; }
            .btn { padding: 10px 16px; font-size: 13px; }
            .stats { flex-direction: column; }
            .header { flex-direction: column; align-items: flex-start; }
            .auth-container { padding: 25px; }
        }
    </style>
</head>
<body>
    <!-- Màn hình đăng nhập -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-container" id="authContainer">
            <!-- Form đăng nhập -->
            <div id="loginForm">
                <div class="auth-logo">
                    <div class="icon">🔒</div>
                    <h2>Đăng Nhập</h2>
                    <p>Quản lý UDID Devices</p>
                </div>
                <div class="auth-error" id="loginError"></div>
                <div class="auth-input-group">
                    <label>📧 Email</label>
                    <input type="email" class="auth-input" id="loginEmail" placeholder="Nhập email của bạn">
                </div>
                <div class="auth-input-group">
                    <label>🔑 Mật khẩu</label>
                    <input type="password" class="auth-input" id="loginPassword" placeholder="Nhập mật khẩu">
                </div>
                <button class="auth-btn auth-btn-login" id="loginBtn" onclick="handleLogin()">
                    Đăng Nhập
                </button>
                <div class="auth-toggle">
                    Chưa có tài khoản? <a onclick="showRegisterForm()">Đăng ký</a>
                </div>
            </div>

            <!-- Form đăng ký -->
            <div id="registerForm" style="display: none;">
                <div class="auth-logo">
                    <div class="icon">📝</div>
                    <h2>Đăng Ký</h2>
                    <p>Tạo tài khoản quản lý mới</p>
                </div>
                <div class="auth-error" id="registerError"></div>
                <div class="auth-input-group">
                    <label>📧 Email</label>
                    <input type="email" class="auth-input" id="registerEmail" placeholder="Nhập email của bạn">
                </div>
                <div class="auth-input-group">
                    <label>🔑 Mật khẩu</label>
                    <input type="password" class="auth-input" id="registerPassword" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)">
                </div>
                <div class="auth-input-group">
                    <label>🔑 Xác nhận mật khẩu</label>
                    <input type="password" class="auth-input" id="registerConfirmPassword" placeholder="Nhập lại mật khẩu">
                </div>
                <button class="auth-btn auth-btn-login" id="registerBtn" onclick="handleRegister()">
                    Đăng Ký
                </button>
                <div class="auth-toggle">
                    Đã có tài khoản? <a onclick="showLoginForm()">Đăng nhập</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Giao diện chính -->
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>🔒 Quản Lý UDID</h1>
            <div class="header-right">
                <div class="user-info" id="userInfo">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span id="userEmail">user@email.com</span>
                </div>
                <button class="btn-logout" onclick="handleLogout()">🚪 Đăng xuất</button>
                <div class="connection-status status-disconnected" id="connectionStatus">
                    <span class="status-dot dot-disconnected" id="statusDot"></span>
                    <span id="statusText">Đang kết nối...</span>
                </div>
            </div>
        </div>
        
        <p style="color: #aaa; margin-bottom: 20px; font-size: 14px; text-align: center;">
            Kết nối tới Firebase Realtime Database
        </p>

        <div class="stats">
            <div class="stat-card stat-total">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">📱 Tổng thiết bị</div>
            </div>
            <div class="stat-card stat-blocked">
                <div class="stat-number" id="blockedCount">0</div>
                <div class="stat-label">🚫 Đã chặn</div>
            </div>
            <div class="stat-card stat-active">
                <div class="stat-number" id="activeCount">0</div>
                <div class="stat-label">✅ Hoạt động</div>
            </div>
        </div>

        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Tìm kiếm UDID...">
            <span class="search-icon">🔍</span>
        </div>

        <div class="btn-container">
            <button class="btn btn-block-all" onclick="confirmBlockAll()">
                🚫 Chặn tất cả
            </button>
            <button class="btn btn-unblock-all" onclick="confirmUnblockAll()">
                ✅ Mở khóa tất cả
            </button>
            <button class="btn btn-refresh" onclick="loadAllData()">
                🔄 Làm mới
            </button>
        </div>

        <div id="udidList">
            <div class="loading-container">
                <div class="spinner"></div>
                <p>Đang tải dữ liệu từ Firebase...</p>
            </div>
        </div>

        <div class="last-update" id="lastUpdate"></div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAv2nCutccY9w989YWnxGF0oIdnOiOu2gY",
            authDomain: "dbanand-73d4b.firebaseapp.com",
            databaseURL: "https://dbanand-73d4b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dbanand-73d4b",
            storageBucket: "dbanand-73d4b.firebasestorage.app",
            messagingSenderId: "134109863841",
            appId: "1:134109863841:web:e85af018975585250ab5e0",
            measurementId: "G-87M88GHTKY"
        };

        // Biến toàn cục
        let firebaseApp;
        let auth;
        let database;
        let devicesRef;
        let blockedRef;
        let allDevices = {};
        let blockedUDIDs = {};  // Danh sách UDID bị chặn (từ blocked_udids)
        let isConnected = false;
        let currentUser = null;

        // ============================================================
        // KHỞI TẠO FIREBASE
        // ============================================================
        function initializeFirebase() {
            try {
                firebaseApp = firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                database = firebase.database();
                devicesRef = database.ref('devices');
                blockedRef = database.ref('blocked_udids');  // Reference tới blocked_udids
                
                console.log('✅ Firebase đã được khởi tạo');
                console.log('📁 Devices path:', 'devices/');
                console.log('🚫 Blocked path:', 'blocked_udids/');
                
                // Lắng nghe trạng thái xác thực
                setupAuthListener();
                
            } catch (error) {
                console.error('❌ Lỗi khởi tạo Firebase:', error);
                showNotification('❌ Lỗi khởi tạo: ' + error.message, 'error');
            }
        }

        // ============================================================
        // XÁC THỰC NGƯỜI DÙNG
        // ============================================================
        function setupAuthListener() {
            auth.onAuthStateChanged((user) => {
                currentUser = user;
                
                if (user) {
                    console.log('👤 Đã đăng nhập:', user.email);
                    document.getElementById('authOverlay').style.display = 'none';
                    document.getElementById('mainContainer').style.display = 'block';
                    
                    document.getElementById('userEmail').textContent = user.email;
                    const avatar = document.getElementById('userAvatar');
                    avatar.textContent = user.email.charAt(0).toUpperCase();
                    
                    // Thiết lập listener cho database
                    setupDatabaseListeners();
                    
                    showNotification('✅ Đăng nhập thành công!', 'success');
                } else {
                    console.log('👤 Chưa đăng nhập');
                    document.getElementById('authOverlay').style.display = 'flex';
                    document.getElementById('mainContainer').style.display = 'none';
                    
                    // Xóa listener database nếu có
                    if (devicesRef) devicesRef.off();
                    if (blockedRef) blockedRef.off();
                    allDevices = {};
                    blockedUDIDs = {};
                }
            });
        }

        function setupDatabaseListeners() {
            if (!currentUser) return;
            
            // Lắng nghe trạng thái kết nối
            const connectedRef = database.ref('.info/connected');
            connectedRef.on('value', (snap) => {
                isConnected = snap.val() === true;
                updateConnectionStatus();
            });

            // Lắng nghe danh sách devices
            devicesRef.on('value', (snapshot) => {
                const data = snapshot.val();
                allDevices = data || {};
                console.log('📱 Devices loaded:', Object.keys(allDevices).length);
                renderUDIDList();
            }, (error) => {
                console.error('❌ Lỗi tải devices:', error);
                handleDatabaseError(error);
            });

            // Lắng nghe danh sách blocked_udids
            blockedRef.on('value', (snapshot) => {
                const data = snapshot.val();
                blockedUDIDs = data || {};
                console.log('🚫 Blocked UDIDs loaded:', Object.keys(blockedUDIDs).length);
                renderUDIDList();
            }, (error) => {
                console.error('❌ Lỗi tải blocked_udids:', error);
                handleDatabaseError(error);
            });
            
            updateConnectionStatus();
        }

        function handleDatabaseError(error) {
            if (error.code === 'PERMISSION_DENIED') {
                showNotification('❌ Bạn không có quyền truy cập dữ liệu này', 'error');
            } else {
                showNotification('❌ Lỗi kết nối: ' + error.message, 'error');
            }
        }

        function loadAllData() {
            if (!currentUser) return;
            
            Promise.all([
                devicesRef.once('value'),
                blockedRef.once('value')
            ]).then(([devicesSnap, blockedSnap]) => {
                allDevices = devicesSnap.val() || {};
                blockedUDIDs = blockedSnap.val() || {};
                renderUDIDList();
                showNotification('✅ Dữ liệu đã được làm mới', 'success');
            }).catch((error) => {
                showNotification('❌ Lỗi tải dữ liệu: ' + error.message, 'error');
            });
        }

        // ============================================================
        // ĐĂNG NHẬP / ĐĂNG KÝ / ĐĂNG XUẤT
        // ============================================================
        function showLoginForm() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
            clearAuthInputs();
        }

        function showRegisterForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
            clearAuthInputs();
        }

        function clearAuthInputs() {
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('registerEmail').value = '';
            document.getElementById('registerPassword').value = '';
            document.getElementById('registerConfirmPassword').value = '';
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                showAuthError(errorEl, 'Vui lòng nhập đầy đủ email và mật khẩu');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Đang đăng nhập...';
            errorEl.style.display = 'none';

            try {
                await auth.signInWithEmailAndPassword(email, password);
                console.log('✅ Đăng nhập thành công');
            } catch (error) {
                console.error('❌ Lỗi đăng nhập:', error);
                let message = getAuthErrorMessage(error.code);
                showAuthError(errorEl, message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Đăng Nhập';
            }
        }

        async function handleRegister() {
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const errorEl = document.getElementById('registerError');
            const btn = document.getElementById('registerBtn');

            if (!email || !password || !confirmPassword) {
                showAuthError(errorEl, 'Vui lòng nhập đầy đủ thông tin');
                return;
            }

            if (password.length < 6) {
                showAuthError(errorEl, 'Mật khẩu phải có ít nhất 6 ký tự');
                return;
            }

            if (password !== confirmPassword) {
                showAuthError(errorEl, 'Mật khẩu xác nhận không khớp');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Đang đăng ký...';
            errorEl.style.display = 'none';

            try {
                await auth.createUserWithEmailAndPassword(email, password);
                console.log('✅ Đăng ký thành công');
                showNotification('✅ Đăng ký thành công! Bạn đã tự động đăng nhập.', 'success');
            } catch (error) {
                console.error('❌ Lỗi đăng ký:', error);
                let message = getAuthErrorMessage(error.code);
                showAuthError(errorEl, message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Đăng Ký';
            }
        }

        function getAuthErrorMessage(code) {
            const messages = {
                'auth/invalid-email': 'Email không hợp lệ',
                'auth/user-disabled': 'Tài khoản đã bị vô hiệu hóa',
                'auth/user-not-found': 'Không tìm thấy tài khoản với email này',
                'auth/wrong-password': 'Mật khẩu không chính xác',
                'auth/invalid-credential': 'Email hoặc mật khẩu không chính xác',
                'auth/too-many-requests': 'Quá nhiều lần thử. Vui lòng thử lại sau',
                'auth/email-already-in-use': 'Email này đã được sử dụng',
                'auth/operation-not-allowed': 'Đăng ký không được phép. Vui lòng liên hệ admin',
                'auth/weak-password': 'Mật khẩu quá yếu. Vui lòng chọn mật khẩu mạnh hơn'
            };
            return messages[code] || 'Lỗi xác thực: ' + code;
        }

        function showAuthError(element, message) {
            element.textContent = '⚠️ ' + message;
            element.style.display = 'block';
        }

        async function handleLogout() {
            try {
                await auth.signOut();
                showNotification('👋 Đã đăng xuất', 'info');
            } catch (error) {
                console.error('❌ Lỗi đăng xuất:', error);
                showNotification('❌ Lỗi đăng xuất: ' + error.message, 'error');
            }
        }

        // Enter để đăng nhập/đăng ký
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const authOverlay = document.getElementById('authOverlay');
                if (authOverlay.style.display !== 'none') {
                    const loginForm = document.getElementById('loginForm');
                    const registerForm = document.getElementById('registerForm');
                    
                    if (loginForm.style.display !== 'none') {
                        handleLogin();
                    } else if (registerForm.style.display !== 'none') {
                        handleRegister();
                    }
                }
            }
        });

        // ============================================================
        // KIỂM TRA TRẠNG THÁI BLOCK
        // ============================================================
        function isUDIDBlocked(udid) {
            // Kiểm tra trong blocked_udids
            if (blockedUDIDs[udid]) {
                const blockData = blockedUDIDs[udid];
                // Kiểm tra các trường block
                if (blockData.blocked === true) return true;
                if (blockData.banned === true) return true;
                if (blockData.kill_switch === true) return true;
                
                // Kiểm tra expiry
                if (blockData.expiry) {
                    const now = Math.floor(Date.now() / 1000);
                    if (blockData.expiry > now) return true;
                }
                
                // Nếu có trong blocked_udids nhưng không có flag block nào = true
                // thì coi như đã bị block (tồn tại trong danh sách blocked)
                return true;
            }
            return false;
        }

        function getBlockReason(udid) {
            if (!blockedUDIDs[udid]) return null;
            const data = blockedUDIDs[udid];
            const reasons = [];
            if (data.blocked) reasons.push('blocked');
            if (data.banned) reasons.push('banned');
            if (data.kill_switch) reasons.push('kill_switch');
            if (data.expiry && data.expiry > Math.floor(Date.now() / 1000)) reasons.push('expiry');
            return reasons.length > 0 ? reasons.join(', ') : 'in list';
        }

        // ============================================================
        // THÔNG BÁO
        // ============================================================
        function showNotification(message, type = 'success') {
            // Xóa notification cũ
            const existing = document.querySelectorAll('.notification');
            existing.forEach(n => n.remove());
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // ============================================================
        // XÁC NHẬN
        // ============================================================
        function showConfirm(title, message, onConfirm) {
            // Xóa confirm cũ nếu có
            const existing = document.querySelectorAll('.confirm-overlay');
            existing.forEach(e => e.remove());
            
            const overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.innerHTML = `
                <div class="confirm-modal">
                    <h3>${title}</h3>
                    <p>${message}</p>
                    <div class="confirm-buttons">
                        <button class="confirm-btn-yes" id="confirmYes">✅ Xác nhận</button>
                        <button class="confirm-btn-no" id="confirmNo">❌ Hủy</button>
                    </div>
                </div>
            `;

            document.body.appendChild(overlay);

            document.getElementById('confirmYes').onclick = () => {
                overlay.remove();
                onConfirm();
            };

            document.getElementById('confirmNo').onclick = () => {
                overlay.remove();
            };

            overlay.onclick = (e) => {
                if (e.target === overlay) overlay.remove();
            };
        }

        function confirmBlockAll() {
            if (!currentUser) {
                showNotification('❌ Vui lòng đăng nhập', 'error');
                return;
            }
            
            const udids = Object.keys(allDevices);
            const unblockedCount = udids.filter(udid => !isUDIDBlocked(udid)).length;
            
            if (udids.length === 0) {
                showNotification('❌ Không có UDID nào', 'error');
                return;
            }
            
            if (unblockedCount === 0) {
                showNotification('ℹ️ Tất cả UDID đã bị chặn', 'info');
                return;
            }

            showConfirm(
                '⚠️ Chặn tất cả UDID',
                `Bạn có chắc muốn chặn <b>${unblockedCount}</b> UDID đang hoạt động?<br>Tổng số thiết bị: <b>${udids.length}</b><br><br><small style="color: #ffa500;">UDID sẽ được thêm vào blocked_udids/</small>`,
                blockAllUDIDs
            );
        }

        function confirmUnblockAll() {
            if (!currentUser) {
                showNotification('❌ Vui lòng đăng nhập', 'error');
                return;
            }
            
            const blockedCount = Object.keys(blockedUDIDs).length;
            
            if (blockedCount === 0) {
                showNotification('ℹ️ Không có UDID nào bị chặn', 'info');
                return;
            }

            showConfirm(
                '🔓 Mở khóa tất cả UDID',
                `Bạn có chắc muốn mở khóa <b>${blockedCount}</b> UDID đang bị chặn?<br><br><small style="color: #ffa500;">UDID sẽ bị xóa khỏi blocked_udids/</small>`,
                unblockAllUDIDs
            );
        }

        // ============================================================
        // THAO TÁC BLOCK/UNBLOCK
        // ============================================================
        async function blockAllUDIDs() {
            if (!currentUser) return;
            
            try {
                const updates = {};
                const now = Math.floor(Date.now() / 1000);
                let blockCount = 0;
                
                for (let udid in allDevices) {
                    if (!isUDIDBlocked(udid)) {
                        updates[`blocked_udids/${udid}`] = {
                            blocked: true,
                            banned: true,
                            kill_switch: true,
                            blocked_at: now,
                            blocked_by: currentUser.email,
                            udid: udid
                        };
                        blockCount++;
                    }
                }

                if (Object.keys(updates).length > 0) {
                    await database.ref().update(updates);
                    showNotification(`✅ Đã chặn thành công ${blockCount} UDID`, 'success');
                } else {
                    showNotification('ℹ️ Không có UDID mới nào cần chặn', 'info');
                }
            } catch (error) {
                console.error('❌ Lỗi chặn tất cả:', error);
                showNotification('❌ Lỗi: ' + error.message, 'error');
            }
        }

        async function unblockAllUDIDs() {
            if (!currentUser) return;
            
            try {
                const blockedKeys = Object.keys(blockedUDIDs);
                
                if (blockedKeys.length === 0) {
                    showNotification('ℹ️ Không có UDID nào bị chặn', 'info');
                    return;
                }

                // Xóa tất cả khỏi blocked_udids
                await blockedRef.remove();
                showNotification(`✅ Đã mở khóa thành công ${blockedKeys.length} UDID`, 'success');
            } catch (error) {
                console.error('❌ Lỗi mở khóa tất cả:', error);
                showNotification('❌ Lỗi: ' + error.message, 'error');
            }
        }

        async function toggleBlock(udid) {
            if (!currentUser) {
                showNotification('❌ Vui lòng đăng nhập', 'error');
                return;
            }
            
            try {
                const isBlocked = isUDIDBlocked(udid);
                const now = Math.floor(Date.now() / 1000);
                const shortUDID = udid.length > 16 ? udid.substring(0, 16) + '...' : udid;

                if (isBlocked) {
                    // Mở khóa: Xóa khỏi blocked_udids
                    await blockedRef.child(udid).remove();
                    showNotification(`✅ Đã mở khóa: ${shortUDID}`, 'success');
                } else {
                    // Chặn: Thêm vào blocked_udids
                    const blockData = {
                        blocked: true,
                        banned: true,
                        kill_switch: true,
                        blocked_at: now,
                        blocked_by: currentUser.email,
                        udid: udid
                    };
                    
                    // Nếu có thông tin từ devices, giữ lại một số thông tin
                    if (allDevices[udid]) {
                        if (allDevices[udid].app_version) blockData.app_version = allDevices[udid].app_version;
                        if (allDevices[udid].last_active) blockData.last_active = allDevices[udid].last_active;
                    }
                    
                    await blockedRef.child(udid).set(blockData);
                    showNotification(`🚫 Đã chặn: ${shortUDID}`, 'warning');
                }
            } catch (error) {
                console.error('❌ Lỗi toggle block:', error);
                showNotification('❌ Lỗi: ' + error.message, 'error');
            }
        }

        async function deleteUDID(udid) {
            if (!currentUser) {
                showNotification('❌ Vui lòng đăng nhập', 'error');
                return;
            }
            
            showConfirm(
                '🗑️ Xóa UDID',
                `Bạn có chắc muốn xóa UDID này khỏi tất cả danh sách?<br><code style="color: #ffa500;">${udid}</code>`,
                async () => {
                    try {
                        const promises = [];
                        
                        // Xóa khỏi devices nếu có
                        if (allDevices[udid]) {
                            promises.push(devicesRef.child(udid).remove());
                        }
                        
                        // Xóa khỏi blocked_udids nếu có
                        if (blockedUDIDs[udid]) {
                            promises.push(blockedRef.child(udid).remove());
                        }
                        
                        await Promise.all(promises);
                        
                        const shortUDID = udid.length > 16 ? udid.substring(0, 16) + '...' : udid;
                        showNotification(`🗑️ Đã xóa: ${shortUDID}`, 'success');
                    } catch (error) {
                        showNotification('❌ Lỗi: ' + error.message, 'error');
                    }
                }
            );
        }

        // ============================================================
        // FORMAT
        // ============================================================
        function formatTime(timestamp) {
            if (!timestamp) return 'N/A';
            const date = new Date(timestamp * 1000);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Vừa xong';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} phút trước`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} giờ trước`;
            if (diff < 2592000000) return `${Math.floor(diff / 86400000)} ngày trước`;
            
            return date.toLocaleDateString('vi-VN', { 
                day: '2-digit', 
                month: '2-digit', 
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // ============================================================
        // RENDER
        // ============================================================
        function renderUDIDList() {
            if (!currentUser) return;
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const udidListEl = document.getElementById('udidList');
            
            // Tạo danh sách tổng hợp từ cả devices và blocked_udids
            const allUDIDs = new Set([
                ...Object.keys(allDevices),
                ...Object.keys(blockedUDIDs)
            ]);
            
            let devices = [];
            allUDIDs.forEach(udid => {
                const deviceData = allDevices[udid] || {};
                const blockedData = blockedUDIDs[udid] || {};
                const isBlocked = isUDIDBlocked(udid);
                
                devices.push({
                    udid: udid,
                    blocked: isBlocked,
                    blockReason: getBlockReason(udid),
                    app_version: deviceData.app_version || blockedData.app_version || null,
                    last_active: deviceData.last_active || blockedData.last_active || null,
                    registered_at: deviceData.registered_at || null,
                    active: deviceData.active !== false,
                    blocked_at: blockedData.blocked_at || null,
                    blocked_by: blockedData.blocked_by || null,
                    inDevices: !!allDevices[udid],
                    inBlocked: !!blockedUDIDs[udid]
                });
            });

            // Lọc theo từ khóa
            if (searchTerm) {
                devices = devices.filter(device => 
                    device.udid.toLowerCase().includes(searchTerm) ||
                    (device.app_version && device.app_version.toLowerCase().includes(searchTerm))
                );
            }

            // Sắp xếp: blocked lên trước, sau đó theo thời gian
            devices.sort((a, b) => {
                if (a.blocked && !b.blocked) return -1;
                if (!a.blocked && b.blocked) return 1;
                return (b.last_active || 0) - (a.last_active || 0);
            });

            // Cập nhật thống kê
            const totalDevices = allUDIDs.size;
            const blockedDevices = Object.keys(blockedUDIDs).length;
            const activeDevices = devices.filter(d => !d.blocked && d.inDevices).length;

            document.getElementById('totalCount').textContent = totalDevices;
            document.getElementById('blockedCount').textContent = blockedDevices;
            document.getElementById('activeCount').textContent = activeDevices;

            // Cập nhật thời gian
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                `🕐 Cập nhật: ${now.toLocaleTimeString('vi-VN')} | Thiết bị: ${totalDevices} | Đã chặn: ${blockedDevices}`;

            // Render danh sách
            if (devices.length === 0) {
                udidListEl.innerHTML = searchTerm ? 
                    `<div class="empty-state">
                        <div class="icon">🔍</div>
                        <p>Không tìm thấy UDID phù hợp với "${searchTerm}"</p>
                    </div>` :
                    `<div class="empty-state">
                        <div class="icon">📱</div>
                        <p>Chưa có thiết bị nào được đăng ký</p>
                    </div>`;
                return;
            }

            udidListEl.innerHTML = devices.map(device => {
                const statusClass = device.blocked ? 'blocked' : 'active';
                const statusText = device.blocked ? '🚫 Đã chặn' : '✅ Hoạt động';
                const statusBadgeClass = device.blocked ? 'status-blocked' : 'status-active';
                
                // Thông tin block
                let blockInfoHTML = '';
                if (device.blocked && device.blockReason) {
                    blockInfoHTML = `<span class="blocked-badge">${device.blockReason}</span>`;
                }
                if (device.blocked && device.blocked_by) {
                    blockInfoHTML += `<span class="blocked-badge" style="background: rgba(255,165,0,0.2); color: #ffa500;">bởi: ${device.blocked_by}</span>`;
                }
                
                // Badge nguồn dữ liệu
                let sourceBadge = '';
                if (device.inDevices && device.inBlocked) {
                    sourceBadge = '<span style="font-size: 10px; color: #888;">📱🚫</span>';
                } else if (device.inBlocked && !device.inDevices) {
                    sourceBadge = '<span style="font-size: 10px; color: #ffa500;">⚠️ Chỉ trong blocked</span>';
                }
                
                return `
                <div class="udid-item ${statusClass}">
                    <div class="udid-info">
                        <div class="udid-text">
                            📱 ${device.udid}
                            ${sourceBadge}
                        </div>
                        <div class="udid-details">
                            ${device.last_active ? `<span class="udid-detail-item">🕐 ${formatTime(device.last_active)}</span>` : ''}
                            ${device.app_version ? `<span class="udid-detail-item">📦 v${device.app_version}</span>` : ''}
                            ${device.registered_at ? `<span class="udid-detail-item">📅 ĐK: ${formatTime(device.registered_at)}</span>` : ''}
                            ${device.blocked_at ? `<span class="udid-detail-item">🚫 Chặn: ${formatTime(device.blocked_at)}</span>` : ''}
                        </div>
                        <div style="margin-top: 3px;">
                            ${blockInfoHTML}
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                        <span class="udid-status ${statusBadgeClass}">${statusText}</span>
                        <div class="udid-actions">
                            ${device.blocked ? 
                                `<button class="btn-action btn-unblock" onclick="toggleBlock('${device.udid}')">🔓 Mở khóa</button>` :
                                `<button class="btn-action btn-block" onclick="toggleBlock('${device.udid}')">🔒 Chặn</button>`
                            }
                            <button class="btn-action btn-delete" onclick="deleteUDID('${device.udid}')">🗑️</button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        document.getElementById('searchInput').addEventListener('input', renderUDIDList);

        document.addEventListener('keydown', function(e) {
            // Bỏ qua nếu đang ở màn hình đăng nhập
            const authOverlay = document.getElementById('authOverlay');
            if (authOverlay && authOverlay.style.display !== 'none') return;
            
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
            
            if (e.key === 'Escape') {
                document.getElementById('searchInput').value = '';
                renderUDIDList();
                document.getElementById('searchInput').blur();
            }
        });

        // ============================================================
        // CẬP NHẬT TRẠNG THÁI KẾT NỐI
        // ============================================================
        function updateConnectionStatus() {
            const statusEl = document.getElementById('connectionStatus');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            if (isConnected) {
                statusEl.className = 'connection-status status-connected';
                statusDot.className = 'status-dot dot-connected';
                statusText.textContent = 'Đã kết nối';
            } else {
                statusEl.className = 'connection-status status-disconnected';
                statusDot.className = 'status-dot dot-disconnected';
                statusText.textContent = 'Mất kết nối';
            }
        }

        // ============================================================
        // KHỞI TẠO
        // ============================================================
        window.addEventListener('DOMContentLoaded', () => {
            initializeFirebase();
            console.log('🔒 Hệ thống quản lý UDID đã sẵn sàng');
            console.log('📡 Firebase URL:', firebaseConfig.databaseURL);
            console.log('🔐 Authentication: Đã kích hoạt');
            console.log('📁 Cấu trúc dữ liệu:');
            console.log('   - devices/: danh sách thiết bị đăng ký');
            console.log('   - blocked_udids/: danh sách UDID bị chặn');
        });

        // Tự động kiểm tra kết nối
        setInterval(() => {
            if (!isConnected && currentUser) {
                updateConnectionStatus();
            }
        }, 5000);
    </script>
</body>
</html>
